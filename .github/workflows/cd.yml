name: Continuous Deployment

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  id-token: write
  contents: write

concurrency:
  group: cd-main
  cancel-in-progress: true

env:
  AWS_REGION: ap-south-1
  AWS_ACCOUNT_ID: "379515795932"
  ECR_REPOSITORY: flask-demo
  IMAGE_NAME: flask-demo

jobs:
  deploy:
    name: Build, Push and Update GitOps
    runs-on: ubuntu-latest

    steps:

      # ------------------------------------------------------------
      # Checkout Repository
      # ------------------------------------------------------------

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ------------------------------------------------------------
      # Configure AWS Credentials (OIDC)
      # ------------------------------------------------------------

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ------------------------------------------------------------
      # Login to Amazon ECR
      # ------------------------------------------------------------

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ------------------------------------------------------------
      # Docker Buildx
      # ------------------------------------------------------------

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ------------------------------------------------------------
      # Build and Push Docker Image
      # ------------------------------------------------------------

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ------------------------------------------------------------
      # Install Helm
      # ------------------------------------------------------------

      - name: Install Helm
        uses: azure/setup-helm@v4

      # ------------------------------------------------------------
      # Helm Lint
      # ------------------------------------------------------------

      - name: Helm Lint
        run: helm lint helm/flask-demo

      # ------------------------------------------------------------
      # Update Helm values.yaml
      # ------------------------------------------------------------

      - name: Update Helm Image Tag
        run: |
          sed -i "s/tag:.*/tag: \"${GITHUB_SHA}\"/" helm/flask-demo/values.yaml

      # ------------------------------------------------------------
      # Commit Updated values.yaml
      # ------------------------------------------------------------

      - name: Commit Updated values.yaml
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add helm/flask-demo/values.yaml

          if git diff --cached --quiet; then
            echo "No changes detected."
          else
            git commit -m "ci: update image tag ${GITHUB_SHA}"
            git push
          fi

      # ------------------------------------------------------------
      # Deployment Summary
      # ------------------------------------------------------------

      - name: Deployment Summary
        run: |
          {
            echo "## Continuous Deployment Summary"
            echo ""
            echo "| Component | Status |"
            echo "|----------|--------|"
            echo "| Docker Build | ✅ |"
            echo "| Amazon ECR Push | ✅ |"
            echo "| Helm Update | ✅ |"
            echo "| GitOps Commit | ✅ |"
            echo "| Argo CD Sync | Automatic |"
            echo ""
            echo "### Image"
            echo ""
            echo "\`${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:${GITHUB_SHA}\`"
          } >> "$GITHUB_STEP_SUMMARY"