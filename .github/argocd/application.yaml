apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: flask-demo
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Krish0257/flask-rollouts-demo.git
    targetRevision: main
    path: helm/flask-demo

    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true