# -----------------------------------------------------------------------------
# Application
# -----------------------------------------------------------------------------
nameOverride: ""
fullnameOverride: ""

replicaCount: 2

replicaCount: 2

image:
  repository: 379515795932.dkr.ecr.ap-south-1.amazonaws.com/flask-demo
  pullPolicy: IfNotPresent
  tag: "164c134ae495eccd5eef0a532474ec3967fcc121"

imagePullSecrets: []

# -----------------------------------------------------------------------------
# Service
# -----------------------------------------------------------------------------
service:
  type: ClusterIP
  port: 80
  targetPort: 5000

# -----------------------------------------------------------------------------
# Container
# -----------------------------------------------------------------------------
container:
  port: 5000

# -----------------------------------------------------------------------------
# Environment Variables
# -----------------------------------------------------------------------------
env:
  APP_NAME: inventory-service
  APP_VERSION: "1.2.0"
  ENVIRONMENT: dev
  FAILURE_RATE: "0.5"
  RESPONSE_DELAY: "0"

# -----------------------------------------------------------------------------
# Resources
# -----------------------------------------------------------------------------
resources:
  requests:
    cpu: 100m
    memory: 128Mi

  limits:
    cpu: 250m
    memory: 256Mi

# -----------------------------------------------------------------------------
# Probes
# -----------------------------------------------------------------------------
livenessProbe:
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 15

readinessProbe:
  path: /ready
  initialDelaySeconds: 5
  periodSeconds: 10

# -----------------------------------------------------------------------------
# Rollout Strategy
# -----------------------------------------------------------------------------
rollout:
  replicas: 2

  revisionHistoryLimit: 3

  strategy:
    canary:
      steps:
        - setWeight: 20
        - pause:
            duration: 30s

        - analysis:
            templates:
              - templateName: flask-demo-analysis

        - setWeight: 50
        - pause:
            duration: 30s

        - analysis:
            templates:
              - templateName: flask-demo-analysis

        - setWeight: 100

# -----------------------------------------------------------------------------
# -----------------------------------------------------------------------------
# ServiceMonitor
# -----------------------------------------------------------------------------
serviceMonitor:
  enabled: true

  release: kube-prometheus-stack

  path: /metrics

  interval: 15s

# -----------------------------------------------------------------------------
# Analysis
# -----------------------------------------------------------------------------
analysis:
  successRate: 95

# -----------------------------------------------------------------------------
# Ingress
# -----------------------------------------------------------------------------
ingress:
  enabled: true

  className: nginx

  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /

  hosts:
    - host: flask-demo.local
      paths:
        - path: /
          pathType: Prefix

  tls: []

# -----------------------------------------------------------------------------
# Node Selector
# -----------------------------------------------------------------------------
nodeSelector: {}

tolerations: []

affinity: {}