# -----------------------------------------------------------------------------
# Application
# -----------------------------------------------------------------------------
nameOverride: ""
fullnameOverride: ""

replicaCount: 2

image:
  repository: 379515795932.dkr.ecr.ap-south-1.amazonaws.com/flask-demo
  pullPolicy: IfNotPresent
  tag: "fbc07303caad880e96c666f7ad6e4ae140683298"

imagePullSecrets: []

# -----------------------------------------------------------------------------
# Service Account
# -----------------------------------------------------------------------------
serviceAccount:
  create: true
  annotations: {}
  name: ""

# -----------------------------------------------------------------------------
# Pod Metadata
# -----------------------------------------------------------------------------
podAnnotations: {}

podLabels: {}

# -----------------------------------------------------------------------------
# Pod Security
# -----------------------------------------------------------------------------
podSecurityContext: {}

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false

# -----------------------------------------------------------------------------
# Service
# -----------------------------------------------------------------------------
service:
  type: ClusterIP
  port: 80
  targetPort: 5000

# -----------------------------------------------------------------------------
# Container
# -----------------------------------------------------------------------------
container:
  port: 5000

# -----------------------------------------------------------------------------
# Environment Variables
# -----------------------------------------------------------------------------
env:
  APP_NAME: inventory-service
  APP_VERSION: "1.2.0"
  ENVIRONMENT: production
  FAILURE_RATE: "0.5"
  RESPONSE_DELAY: "0"

# -----------------------------------------------------------------------------
# Resources
# -----------------------------------------------------------------------------
resources:
  requests:
    cpu: 100m
    memory: 128Mi

  limits:
    cpu: 250m
    memory: 256Mi

# -----------------------------------------------------------------------------
# Health Probes
# -----------------------------------------------------------------------------
livenessProbe:
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 15

readinessProbe:
  path: /ready
  initialDelaySeconds: 5
  periodSeconds: 10

# -----------------------------------------------------------------------------
# Autoscaling
# -----------------------------------------------------------------------------
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

# -----------------------------------------------------------------------------
# Argo Rollouts
# -----------------------------------------------------------------------------
rollout:
  replicas: 2

  revisionHistoryLimit: 3

  progressDeadlineSeconds: 600

  progressDeadlineAbort: true

  strategy:
    canary:
      steps:
        - setWeight: 20

        - pause:
            duration: 30s

        - analysis:
            templates:
              - templateName: flask-demo-analysis

        - setWeight: 50

        - pause:
            duration: 30s

        - analysis:
            templates:
              - templateName: flask-demo-analysis

        - setWeight: 100

# -----------------------------------------------------------------------------
# Prometheus ServiceMonitor
# -----------------------------------------------------------------------------
serviceMonitor:
  enabled: true

  release: kube-prometheus-stack

  path: /metrics

  interval: 15s

# -----------------------------------------------------------------------------
# Argo Rollouts Analysis
# -----------------------------------------------------------------------------
analysis:
  successRate: 95

# -----------------------------------------------------------------------------
# Ingress
# -----------------------------------------------------------------------------
ingress:
  enabled: true

  className: nginx

  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /

  hosts:
    - host: flask-demo.local
      paths:
        - path: /
          pathType: Prefix

  tls: []

# -----------------------------------------------------------------------------
# Scheduling
# -----------------------------------------------------------------------------
nodeSelector: {}

tolerations: []

affinity: {}