---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "flask-demo.fullname" . }}-stable
  labels:
    {{- include "flask-demo.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "flask-demo.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "flask-demo.fullname" . }}-canary
  labels:
    {{- include "flask-demo.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "flask-demo.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP