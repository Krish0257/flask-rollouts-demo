{{- if .Values.ingress.enabled }}

apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: {{ include "flask-demo.fullname" . }}

  labels:
    {{- include "flask-demo.labels" . | nindent 4 }}

  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /

spec:

  ingressClassName: {{ .Values.ingress.className }}

  rules:

    - host: {{ (index .Values.ingress.hosts 0).host }}

      http:

        paths:

          - path: {{ (index .Values.ingress.hosts 0).paths 0).path }}
            pathType: {{ (index .Values.ingress.hosts 0).paths 0).pathType }}

            backend:
              service:

                name: {{ include "flask-demo.fullname" . }}-stable

                port:
                  number: {{ .Values.service.port }}

{{- end }}